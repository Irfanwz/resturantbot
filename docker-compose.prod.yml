# Production overrides - use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn src.restaurant_bot.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --workers 4 --timeout 120
    ports:
      - "8005:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://bot:bot@postgres:5432/restaurant_bot
      - SESSION_STORE=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restaurant_bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d restaurant_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
